x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  charlotte:
    build: .
    container_name: charlotte_bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    tmpfs:
      - /tmp:noexec,nosuid,nodev
    read_only: false
    networks:
      - charlotte-net
    depends_on:
      - redis
      - postgres
      - migrations
      - lossless-core
      - media-core
    logging: *default-logging

  redis:
    image: valkey/valkey:8-alpine
    container_name: charlotte_redis
    restart: unless-stopped
    command: valkey-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - charlotte-net
    logging: *default-logging

  bgutil:
    image: brainicism/bgutil-ytdlp-pot-provider
    container_name: charlotte_bgutil
    networks:
      - charlotte-net
    restart: always
    logging: *default-logging

  lossless-core:
    image: ghcr.io/jellytyan/lossless-core:latest
    container_name: charlotte_lossless_core
    restart: always
    volumes:
      - ./storage:/app/storage
    environment:
      - APPLE_MUSIC_TOKEN=${APPLEMUSIC_DEV_TOKEN}
      - PORT=7856
      - BGUTIL_URL=${BGUTIL_URL}
    networks:
      - charlotte-net
    deploy:
      resources:
        limits:
          cpus: '2'
    logging: *default-logging

  media-core:
    image: ghcr.io/jellytyan/media-core:latest
    container_name: charlotte_media_core
    restart: always
    volumes:
      - ${STORAGE_HOST_PATH}:/app/storage
    environment:
      - PORT=${MEDIA_CORE_PORT}
      - INSTAGRAM_IPV6_SUBNET=${INSTAGRAM_IPV6_SUBNET}
      - TWITTER_AUTH_TOKEN=${AUTH_TOKEN}
      - TWITTER_CSRF_TOKEN=${CSRF_TOKEN}
      - BGUTIL_URL=${BGUTIL_URL}
      - STORAGE_PATH=/app/storage
    networks:
      - charlotte-net
    deploy:
      resources:
        limits:
          cpus: '2'
    logging: *default-logging


  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: always
    profiles:
      - production
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: ${TELEGRAM_LOCAL}
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
      - ./storage:/app/storage
    networks:
      - charlotte-net
    logging: *default-logging

  postgres:
    image: postgres:15-alpine
    container_name: charlotte_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - charlotte-net
    logging: *default-logging

  pg_backup:
    image: prodrigestivill/postgres-backup-local
    container_name: charlotte_db_backup
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      BACKUP_DIR: /backups
      KEEP_BACKUPS: "7"
      BACKUP_SCHEDULE: "0 2 * * *"
      COMPRESS_BACKUP: "true"
    volumes:
      - ./backups:/backups
    networks:
      - charlotte-net
    restart: always
    logging: *default-logging

  migrations:
    build: .
    container_name: charlotte_migrations
    env_file: .env
    command: alembic upgrade head
    depends_on:
      - postgres
    networks:
      - charlotte-net
    logging: *default-logging

  loki:
    image: grafana/loki:2.9.0
    container_name: charlotte_loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    networks:
      - charlotte-net

  promtail:
    image: grafana/promtail:2.9.0
    container_name: charlotte_promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - charlotte-net
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.2.0
    container_name: charlotte_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"  # Порт для входа в интерфейс
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - charlotte-net
    depends_on:
      - loki

networks:
  charlotte-net:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  telegram-bot-api-data:
  loki-data:
  grafana-data:
